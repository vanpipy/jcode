<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#ee8a62" />
  <title>Wind at His Back</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="poster" aria-label="A looping illustration of a pelican riding a bicycle beside the sea">
    <canvas id="pelican-canvas" aria-hidden="true"></canvas>

    <header class="title-block">
      <p class="kicker"><span></span>A small coastal fable</p>
      <h1>Wind<br><em>at his back</em></h1>
      <p class="deck">One bicycle, a basket of sardines,<br />and nowhere particular to be.</p>
    </header>

    <div class="edition" aria-hidden="true">
      <span>№ 07</span>
      <i></i>
      <span>The long way home</span>
    </div>

    <p class="signature" aria-hidden="true">Ride gently · breathe deeply</p>
    <div class="paper-grain" aria-hidden="true"></div>
  </main>
  <script src="pelican.js"></script>
</body>
</html>
